<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeWiki — GitNexus</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}

:root{
--page-bg:#f5f5f7;
--card-bg:#ffffff;
--border-color:#e5e7eb;
--search-bg:#f7f7f9;
--btn-blue:#007aff;
--btn-blue-hover:#0066cc;
--card-btn-bg:#f1f1f3;
--text-title:#111111;
--text-desc:#555555;
--text-meta:#888888;
--tag-bg:#f0f0f2;
}

body{background:var(--page-bg);color:var(--text-title);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── Header ────────────────────── */
.header{position:sticky;top:0;z-index:30;background:var(--card-bg);border-bottom:1px solid var(--border-color);height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 24px}
.header-left{display:flex;align-items:center;gap:10px}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--text-title);font-size:16px;font-weight:600}
.logo-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center;color:var(--btn-blue)}


/* ── Status dot ────────────────── */
.status-dot{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text-meta)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.dot.online{background:#34d399}
.dot.offline{background:#ccc}

/* ── Hero ──────────────────────── */
.hero{text-align:center;padding:40px 24px 20px}
.hero h1{font-size:24px;font-weight:600;letter-spacing:-.02em;color:var(--text-title);line-height:1.3}
.hero-sub{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:6px;font-size:12px;color:var(--text-meta)}

/* ── Search ────────────────────── */
.search-wrap{max-width:540px;margin:20px auto 0}
.search-box{display:flex;align-items:center;gap:8px;background:var(--search-bg);border:none;border-radius:12px;padding:10px 16px;transition:box-shadow .2s}
.search-box:focus-within{box-shadow:0 0 0 2px rgba(0,122,255,.25)}
.search-box svg{width:18px;height:18px;color:#aaa;flex-shrink:0}
.search-box input{flex:1;min-width:0;background:transparent;border:none;outline:none;font-size:15px;color:var(--text-title)}
.search-box input::placeholder{color:#aaa}
.search-clear{background:none;border:none;cursor:pointer;padding:4px 8px;font-size:12px;color:var(--text-meta);transition:color .15s;display:none}
.search-clear:hover{color:var(--text-title)}

/* ── Section ────────────────────── */
.section{max-width:1100px;margin:0 auto;padding:0 24px 80px;flex:1;width:100%}

/* ── Repo grid ─────────────────── */
.repo-grid{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:640px){.repo-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:1024px){.repo-grid{grid-template-columns:repeat(3,1fr)}}

/* Add repo card */
.add-card{display:flex;align-items:center;gap:14px;padding:18px 20px;border-radius:16px;border:1px dashed #d0d0d5;background:var(--card-bg);cursor:pointer;text-decoration:none;color:inherit;transition:all .2s;box-shadow:0 1px 4px rgba(0,0,0,.03)}
.add-card:hover{border-color:var(--btn-blue);box-shadow:0 2px 12px rgba(0,122,255,.08)}
.add-card-icon{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--card-btn-bg);flex-shrink:0;transition:background .2s}
.add-card:hover .add-card-icon{background:#e8edf5}
.add-card-icon svg{width:16px;height:16px;color:var(--btn-blue)}
.add-card-text{min-width:0;flex:1}
.add-card-title{font-size:15px;font-weight:500;color:var(--text-title)}
.add-card-desc{font-size:13px;color:var(--text-meta);margin-top:2px}
.add-card-arrow{width:20px;height:20px;color:#ccc;flex-shrink:0;transition:all .2s}
.add-card:hover .add-card-arrow{color:var(--btn-blue);transform:translateX(3px)}

/* Repo card */
.repo-card{display:flex;align-items:center;gap:14px;padding:18px 20px;border-radius:16px;border:1px solid var(--border-color);background:var(--card-bg);cursor:pointer;text-decoration:none;color:inherit;transition:all .2s;box-shadow:0 1px 4px rgba(0,0,0,.03)}
.repo-card:hover{border-color:#d0d0d5;box-shadow:0 4px 16px rgba(0,0,0,.06)}
.repo-card-content{min-width:0;flex:1;display:flex;align-items:center;gap:12px}
.repo-card-icon{width:16px;height:16px;color:#bbb;flex-shrink:0}
.repo-card-info{min-width:0;flex:1}
.repo-card-name{font-size:15px;font-weight:500;color:var(--text-title);transition:color .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.repo-card:hover .repo-card-name{color:var(--btn-blue)}
.repo-card-stats{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;font-size:12px;color:var(--text-meta)}
.repo-card-arrow{width:20px;height:20px;color:#ccc;flex-shrink:0;transition:all .2s}
.repo-card:hover .repo-card-arrow{color:var(--text-title);transform:translateX(3px)}

/* ── Error / Empty ─────────────── */
.error-banner{margin-bottom:16px;padding:12px 16px;border-radius:12px;border:1px solid #fecaca;background:#fef2f2;text-align:center;font-size:13px;color:#991b1b}
.empty-state{text-align:center;padding:48px 20px;font-size:14px;color:var(--text-meta)}
.empty-state p{margin-bottom:4px}

/* ── Analyzer form ──────────────── */
.analyzer-section{margin-top:32px}
.analyzer-divider{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.analyzer-divider-line{height:1px;flex:1;background:var(--border-color)}
.analyzer-divider-text{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-meta);white-space:nowrap}
.analyzer-box{background:var(--card-bg);border:1px solid var(--border-color);border-radius:16px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.03)}
.analyzer-box h3{font-size:15px;font-weight:600;margin-bottom:4px}
.analyzer-box p{font-size:13px;color:var(--text-meta);margin-bottom:16px}
.analyzer-tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--card-btn-bg);border-radius:8px;padding:3px}
.analyzer-tab{padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;border:none;background:transparent;color:var(--text-meta);transition:all .15s}
.analyzer-tab.active{background:var(--card-bg);color:var(--text-title);box-shadow:0 1px 3px rgba(0,0,0,.06)}
.analyzer-tab:hover:not(.active){color:var(--text-title)}
.analyzer-input-group{display:flex;gap:8px}
.analyzer-input{flex:1;padding:10px 14px;border-radius:8px;border:1px solid var(--border-color);background:var(--search-bg);font-size:14px;color:var(--text-title);outline:none;transition:border-color .15s}
.analyzer-input:focus{border-color:var(--btn-blue)}
.analyzer-input::placeholder{color:#aaa}
.analyzer-btn{padding:10px 20px;border-radius:8px;border:none;background:var(--btn-blue);color:#fff;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .15s;white-space:nowrap}
.analyzer-btn:hover{opacity:.88}
.analyzer-btn:disabled{opacity:.35;cursor:not-allowed}
.analyzer-progress{margin-top:12px;padding:10px 14px;border-radius:8px;background:var(--search-bg);font-size:13px;color:var(--text-desc);display:flex;align-items:center;gap:8px}
.analyzer-error{margin-top:8px;padding:8px 12px;border-radius:6px;background:#fef2f2;border:1px solid #fecaca;font-size:13px;color:#991b1b;display:none}

/* ── Footer ────────────────────── */
.footer{padding:20px 24px;border-top:1px solid var(--border-color);display:flex;flex-direction:column;align-items:center;gap:10px;font-size:12px;color:var(--text-meta)}
@media(min-width:640px){.footer{flex-direction:row;justify-content:space-between}}

.page{min-height:100vh;display:flex;flex-direction:column}

/* ── Animations ────────────────── */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease-out both}
.stagger-delay-1{animation-delay:40ms}
.stagger-delay-2{animation-delay:80ms}
.stagger-delay-3{animation-delay:120ms}
.stagger-delay-4{animation-delay:160ms}
.stagger-delay-5{animation-delay:200ms}
.stagger-delay-6{animation-delay:240ms}
</style>
</head>
<body>

<div class="page">

  <!-- ── Header ────────────────── -->
  <header class="header">
    <a href="/codewiki/" class="header-left logo">
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      CodeWiki
    </a>
  </header>

  <!-- ── Hero ──────────────────── -->
  <section class="hero">
    <h1>Which repo would you like to understand?</h1>
    <div class="hero-sub" id="statusLabel">
      <span class="dot" id="serverDot"></span>
      <span>Initializing...</span>
    </div>
    <div class="search-wrap">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Search for repositories (or paste a URL)..." autocomplete="off">
        <button class="search-clear" id="searchClear" onclick="clearSearch()">Clear</button>
      </div>
    </div>
  </section>

  <!-- ── Content ─────────────────── -->
  <section class="section" id="contentArea">
    <div id="errorContainer" style="display:none"></div>
    <div id="loadingState" class="empty-state"><p>Loading repositories...</p></div>
    <div id="repoGrid" class="repo-grid" style="display:none"></div>
    <div id="emptyState" class="empty-state" style="display:none"><p>No repositories found.</p></div>

    <div id="analyzerSection" class="analyzer-section" style="display:none">
      <div class="analyzer-divider">
        <div class="analyzer-divider-line"></div>
        <span class="analyzer-divider-text">analyze a new repository</span>
        <div class="analyzer-divider-line"></div>
      </div>
      <div class="analyzer-box">
        <h3>Analyze a new repository</h3>
        <p>Paste a GitHub URL to get started</p>
        <div class="analyzer-tabs">
          <button class="analyzer-tab active" data-tab="github" onclick="switchTab('github')">GitHub</button>
          <button class="analyzer-tab" data-tab="gitlab" onclick="switchTab('gitlab')">GitLab</button>
        </div>
        <div class="analyzer-input-group">
          <input type="text" id="repoUrlInput" class="analyzer-input" placeholder="https://github.com/owner/repo">
          <button class="analyzer-btn" id="analyzeBtn" onclick="startAnalysis()">Analyze</button>
        </div>
        <div id="analyzerProgress" style="display:none"></div>
        <div id="analyzerError" class="analyzer-error"></div>
      </div>
    </div>
  </section>

  <!-- ── Footer ────────────────── -->
  <footer class="footer">
    <span>CodeWiki &mdash; Open Source Code Intelligence</span>
  </footer>

</div>

<script>
// ── State ──────────────────────────────────────────
let repos = [];
let addingRepo = false;
let analyzeJobId = null;
const GITHUB_RE = /^https?:\/\/(www\.)?github\.com\/[^/\s]+\/[^/\s]+/i;

// ── DOM refs ───────────────────────────────────────
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');
const repoGrid = document.getElementById('repoGrid');
const loadingState = document.getElementById('loadingState');
const emptyState = document.getElementById('emptyState');
const analyzerSection = document.getElementById('analyzerSection');
const repoUrlInput = document.getElementById('repoUrlInput');
const analyzeBtn = document.getElementById('analyzeBtn');
const analyzerProgress = document.getElementById('analyzerProgress');
const analyzerError = document.getElementById('analyzerError');
const serverDot = document.getElementById('serverDot');
const statusLabel = document.getElementById('statusLabel');

// ── Helpers ────────────────────────────────────────
function escapeHtml(str) {
  var d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function formatRelativeTime(dateStr) {
  var date = new Date(dateStr), now = new Date(), diffMs = now - date, diffMins = Math.floor(diffMs / 60000);
  if (diffMins < 1) return 'just now';
  if (diffMins < 60) return diffMins + 'm ago';
  var h = Math.floor(diffMins / 60);
  if (h < 24) return h + 'h ago';
  var d2 = Math.floor(h / 24);
  if (d2 < 30) return d2 + 'd ago';
  return date.toLocaleDateString();
}

function setServerStatus(connected) {
  serverDot.className = 'dot ' + (connected ? 'online' : 'offline');
  statusLabel.textContent = connected ? 'Index your code with GitNexus' : 'Server offline — start GitNexus';
}

// ── Search ─────────────────────────────────────────
function clearSearch() { searchInput.value = ''; searchClear.style.display = 'none'; renderGrid(); }

searchInput.addEventListener('input', function() {
  searchClear.style.display = this.value ? 'block' : 'none';
  renderGrid();
});

searchInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && GITHUB_RE.test(this.value.trim())) showAnalyzer(this.value.trim());
});

// ── Fetch repos ────────────────────────────────────
async function fetchRepos() {
  var resp = await fetch('/api/repos');
  if (!resp.ok) throw new Error('Server returned ' + resp.status);
  return resp.json();
}

async function probeServer() {
  try { var resp = await fetch('/api/repos', { signal: AbortSignal.timeout(2000) }); return resp.status === 200; }
  catch { return false; }
}

async function loadRepos() {
  loadingState.style.display = 'block';
  repoGrid.style.display = 'none';
  emptyState.style.display = 'none';
  try {
    repos = (await fetchRepos()) || [];
    setServerStatus(true);
    renderGrid();
  } catch {
    setServerStatus(false);
    repos = [];
    loadingState.style.display = 'none';
    emptyState.style.display = 'block';
    emptyState.innerHTML = '<p>Could not connect to server. Start GitNexus to get started.</p>';
  }
}

// ── Render grid ────────────────────────────────────
function renderGrid() {
  var query = searchInput.value.trim().toLowerCase();
  var filtered = query ? repos.filter(function(r) { return r.name.toLowerCase().includes(query); }) : repos;
  loadingState.style.display = 'none';

  if (filtered.length === 0 && query) {
    repoGrid.style.display = 'none';
    emptyState.style.display = 'block';
    emptyState.innerHTML = '<p>No repositories matching &ldquo;' + escapeHtml(query) + '&rdquo;</p>';
    return;
  }
  emptyState.style.display = 'none';
  repoGrid.style.display = 'grid';

  var html = '<div class="fade-in"><div class="add-card" onclick="toggleAnalyzer()">';
  html += '<div class="add-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg></div>';
  html += '<div class="add-card-text"><div class="add-card-title">Add repo</div><div class="add-card-desc">Analyze a new repository</div></div>';
  html += '<svg class="add-card-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></div></div>';

  for (var i = 0; i < filtered.length; i++) {
    var r = filtered[i], stats = r.stats || {}, delay = Math.min(i + 1, 6);
    html += '<div class="fade-in stagger-delay-' + delay + '"><a href="/codewiki/' + encodeURIComponent(r.name) + '" class="repo-card">';
    html += '<div class="repo-card-content">';
    html += '<svg class="repo-card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3v12"/><path d="M18 9a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/><path d="M6 21a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/><path d="M15 6a9 9 0 0 0-9 9"/></svg>';
    html += '<div class="repo-card-info"><div class="repo-card-name">' + escapeHtml(r.name) + '</div>';
    html += '<div class="repo-card-stats">';
    if (stats.files != null) html += '<span>' + stats.files.toLocaleString() + ' files</span>';
    if (stats.nodes != null) html += '<span>' + stats.nodes.toLocaleString() + ' symbols</span>';
    if (stats.processes != null && stats.processes > 0) html += '<span>' + stats.processes + ' flows</span>';
    html += '</div></div></div>';
    html += '<svg class="repo-card-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></a></div>';
  }
  repoGrid.innerHTML = html;
}

// ── Analyzer ───────────────────────────────────────
function toggleAnalyzer() {
  if (addingRepo) { analyzerSection.style.display = 'none'; addingRepo = false; }
  else { showAnalyzer(''); }
}

function showAnalyzer(url) {
  addingRepo = true;
  analyzerSection.style.display = 'block';
  if (url) repoUrlInput.value = url;
  repoUrlInput.focus();
  analyzerSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function switchTab(tab) {
  document.querySelectorAll('.analyzer-tab').forEach(function(t) { t.classList.toggle('active', t.dataset.tab === tab); });
  repoUrlInput.placeholder = tab === 'gitlab' ? 'https://gitlab.com/owner/repo' : 'https://github.com/owner/repo';
}

async function startAnalysis() {
  var url = repoUrlInput.value.trim();
  if (!url) return;
  var activeTab = document.querySelector('.analyzer-tab.active');
  if (activeTab && activeTab.dataset.tab === 'github' && !GITHUB_RE.test(url)) {
    analyzerError.style.display = 'block'; analyzerError.textContent = 'Invalid GitHub URL. Expected: https://github.com/owner/repo'; return;
  }
  analyzeBtn.disabled = true; analyzeBtn.textContent = 'Analyzing...';
  analyzerError.style.display = 'none';
  analyzerProgress.style.display = 'block';
  analyzerProgress.innerHTML = '<div class="analyzer-progress">Starting analysis...</div>';
  try {
    var resp = await fetch('/api/analyze', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ url: url }) });
    if (!resp.ok) throw new Error('Failed to start');
    var data = await resp.json();
    analyzeJobId = data.jobId;
    while (true) {
      await new Promise(function(r) { setTimeout(r, 1000); });
      var sResp = await fetch('/api/analyze/' + encodeURIComponent(analyzeJobId));
      if (!sResp.ok) throw new Error('Status check failed');
      var status = await sResp.json();
      analyzerProgress.innerHTML = '<div class="analyzer-progress">' + (status.progress?.message || 'Processing...') + '</div>';
      if (status.status === 'complete') {
        analyzerProgress.innerHTML = '<div class="analyzer-progress" style="color:#34d399">Analysis complete! Redirecting...</div>';
        setTimeout(function() {
          var name = status.repoName || status.repoPath || '';
          window.location.href = name ? '/codewiki/' + encodeURIComponent(name) : '/codewiki/';
        }, 1000);
        return;
      }
      if (status.status === 'failed') {
        analyzerError.style.display = 'block'; analyzerError.textContent = status.error || 'Analysis failed';
        analyzeBtn.disabled = false; analyzeBtn.textContent = 'Analyze';
        return;
      }
    }
  } catch (err) {
    analyzerError.style.display = 'block'; analyzerError.textContent = err.message || 'Network error';
    analyzeBtn.disabled = false; analyzeBtn.textContent = 'Analyze';
  }
}

// ── Init ────────────────────────────────────────────
(async function init() {
  var ok = await probeServer();
  setServerStatus(ok);
  if (ok) await loadRepos();
  else { loadingState.style.display = 'none'; emptyState.style.display = 'block'; emptyState.innerHTML = '<p>Could not connect to GitNexus server.</p>'; }
})();
</script>

</body>
</html>
